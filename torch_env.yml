name: torch
channels:
  - pytorch
  - nvidia
  - defaults
  - conda-forge
dependencies:
  - python==3.11.0
  - jupyter==1.1.1
  - matplotlib==3.10.3
  - numpy==2.3.2
  - pip==25.1.1
  - pip:
    - torch==2.7.1+cu118
    - --extra-index-url=https://download.pytorch.org/whl/cu118
    - torchvision
    - torchsummary